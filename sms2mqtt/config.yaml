name: SMS2MQTT (TRM240)
version: "0.1.0"
slug: sms2mqtt
description: >-
  Bridge a Teltonika TRM240 / Quectel EC21 GSM modem to MQTT — publishes received
  SMS and GSM stats (operator, signal, roaming) to Home Assistant.
url: https://github.com/alecx/sms2mqtt
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
# uart maps host serial devices into the container; udev exposes the
# /dev/serial/by-id symlinks so the service can pin the stable AT-port path.
uart: true
udev: true
host_network: false
# MQTT broker credentials are injected by the Supervisor (no hardcoding).
services:
  - mqtt:need
# Supervisor restarts the add-on if /health stops returning 200.
watchdog: "http://[HOST]:[PORT:8099]/health"
options:
  serial_device: /dev/serial/by-id/usb-Android_Android-if02-port0
  baud: 115200
  stats_interval: 60s
  log_level: info
schema:
  serial_device: str
  baud: int
  stats_interval: str
  log_level: list(trace|debug|info|warning|error)
