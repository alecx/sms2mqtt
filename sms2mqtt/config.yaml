name: SMS2MQTT (TRM240)
version: "0.5.0"
slug: sms2mqtt
description: >-
  Bridge a Teltonika TRM240 / Quectel EC21 GSM modem to MQTT — publishes received
  SMS and GSM stats (operator, signal, roaming) to Home Assistant.
url: https://github.com/alecx/sms2mqtt
arch:
  - aarch64
  - amd64
startup: application
boot: auto
init: false
# uart maps host serial devices into the container; udev exposes the
# /dev/serial/by-id symlinks so the service can pin the stable AT-port path.
uart: true
udev: true
host_network: false
# MQTT creds come from the Supervisor's broker by default (no hardcoding); an
# external broker can be set via the mqtt_host option below (want, not need, so
# the add-on still starts when pointing at an external broker).
services:
  - mqtt:want
# Supervisor restarts the add-on if /health stops returning 200.
watchdog: "http://[HOST]:[PORT:8099]/health"
options:
  serial_device: /dev/serial/by-id/usb-Android_Android-if02-port0
  baud: 115200
  stats_interval: 60s
  log_level: info
  # Leave mqtt_host blank to use this HA instance's Mosquitto (core-mosquitto).
  # Set it to publish to a different broker, e.g. another HA's broker at
  # 192.168.10.5, so that instance's automations react to the SMS.
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_user: ""
  mqtt_pass: ""
schema:
  serial_device: str
  baud: int
  stats_interval: str
  log_level: list(trace|debug|info|warning|error)
  mqtt_host: str?
  mqtt_port: int?
  mqtt_user: str?
  mqtt_pass: str?
